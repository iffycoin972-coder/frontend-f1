<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AutoMarket - Register</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header class="nav">
    <div class="container nav-inner">
      <a class="logo" href="home.html">
  <img src="logo.png" alt="AutoMarket Logo" class="logo-img">
</a>

      <nav class="nav-center">
        <a class="nav-link" href="home.html">Home</a>
        <a class="nav-link" href="#">Inventory</a>
        <a class="nav-link" href="#">Financing</a>

        <div class="dropdown">
          <button class="dropbtn" type="button">More ▾</button>
          <div class="dropdown-menu">
            <a href="home.html#questions">Questions</a>
            <a href="home.html#contact">Contact</a>
            <a href="#">About</a>
          </div>
        </div>
      </nav>

      <div class="nav-right">
        <a class="btn btn-light" href="index.html">Sign In</a>
        <a class="btn btn-primary" href="#">Browse</a>
      </div>
    </div>
  </header>

  <main class="auth-wrap">
    <div class="container">
      <div class="auth-box">
        <h1>Create Account</h1>
        <p>Join AutoMarket</p>

        <form id="regForm">
          <label class="label" for="fname">First Name</label>
          <input class="input" id="fname" type="text" placeholder="John" />

          <label class="label" for="lname">Last Name</label>
          <input class="input" id="lname" type="text" placeholder="Doe" />

          <label class="label" for="remail">Email</label>
          <input class="input" id="remail" type="email" placeholder="name@example.com" />

          <label class="label" for="rpass">Password</label>
          <input class="input" id="rpass" type="password" placeholder="Min 6 characters" />

          <div class="form-actions">
            <button class="btn btn-primary" type="submit">Register</button>
            <a class="btn btn-outline" href="index.html">Back to Login</a>
          </div>

          <div class="auth-links">
            <a href="home.html">Back to home</a>
            <a href="index.html">Already have an account?</a>
          </div>

          <div class="msg error" id="regErr"></div>
          <div class="msg ok" id="regOk"></div>
        </form>
      </div>
    </div>
  </main>

  <script>
    const regForm = document.getElementById("regForm");
    regForm.addEventListener("submit", function(e){
      e.preventDefault();
      const fname = document.getElementById("fname").value.trim();
      const lname = document.getElementById("lname").value.trim();
      const email = document.getElementById("remail").value.trim();
      const pass = document.getElementById("rpass").value.trim();
      const err = document.getElementById("regErr");
      const ok = document.getElementById("regOk");

      err.textContent = "";
      ok.textContent = "";

      if(fname === "" || lname === ""){
        err.textContent = "First and last name are required.";
        return;
      }
      if(email === "" || !email.includes("@")){
        err.textContent = "Please enter a valid email.";
        return;
      }
      if(pass.length < 6){
        err.textContent = "Password must be at least 6 characters.";
        return;
      }

      ok.textContent = "Account created (demo). Redirecting to login...";
      setTimeout(()=>{ window.location.href = "index.html"; }, 800);
    });
  </script>
</body>
</html>
