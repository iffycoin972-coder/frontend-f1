<!DOCTYPE html>
<html>
<head>
    <title>Join | Paddock Pulse</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="auth-box">
        <h2 style="color: var(--f1-red)">Start Your Engine</h2>
        <p>Create your Paddock Pulse account</p>
        <form>
            <input type="text" placeholder="Full Name" required>
            <input type="email" placeholder="Email Address" required>
            <input type="password" placeholder="Create Password" required>
            <p style="color: var(--text-dim); font-size: 0.7rem;">Password hashing (Bcrypt) and MFA enabled for all accounts.</p>
            <button type="submit">Join the Paddock</button>
        </form>
    </div>
</body>
</html>
